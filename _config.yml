# Build settings
markdown: kramdown
highlighter: rouge
collections : 
  posts: 
    output: true 
    permalink: /:categories/:year-:month-:day-:title

plugins: [jekyll-sitemap, jekyll-feed, jekyll-seo-tag]

sass:
  sass_dir: assets/css
  style: compressed

# Customise atom feed settings (this is where Jekyll-Feed gets configuration information)
title: "BitDevs Cotonou"
description: "BitDevs Cotonou is a community in Cotonou, Benin, for developers, researchers, and enthusiasts interested in the research, development, and practical application of Bitcoin, Nostr, and related protocols. We host discussions, workshops, and collaborative projects to advance knowledge and adoption of these technologies."

# Leave out some files
exclude: ["README.md", "Gemfile", "Gemfile.lock", ".sass-cache"]

future: true

# implementing i18n for EN | PT 
languages: ["en", "pt"]
default_lang : "en"
exclude_from_localizations: ["assets", "css", "js", "img","fonts"]

# defaults configs 
defaults:
  - scope:
      path: "_posts/en"
    values:
      lang: "en"
      category: "en"
  - scope:
      path: "_posts/pt"
    values:
      lang: "pt"
      category: "pt"
